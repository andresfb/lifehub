info:
  name: Pins List
  type: http
  seq: 1

http:
  method: GET
  url: "{{process.env.API_URL}}/dashboard/pins?include=items&status=1"
  params:
    - name: include
      value: items
      type: query
    - name: status
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
