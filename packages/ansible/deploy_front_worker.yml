---
# Playbook: deploy_front_worker.yml
# Description: Deploy LifeHub Frontend worker (SSR queue) to horizon.lan
# Requirements:
#   - Ansible 2.14+
#   - ansible.posix collection  (ansible-galaxy collection install -r requirements.yml)
#   - 1Password CLI (op) authenticated locally
#   - SSH access to horizon.lan as bastidas (with sudo)
# Usage:
#   ansible-playbook -i inventory/hosts.yml deploy_front_worker.yml

# ---------------------------------------------------------------------------
# Play 1 – runs locally: sync repo and fetch secrets
# ---------------------------------------------------------------------------
- name: Prepare local repository and secrets
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  roles:
    - local_repo_sync

  tasks:
    - name: Ensure local web env directory exists
      ansible.builtin.file:
        path: "{{ deploy_local_base }}/web"
        state: directory
        mode: '0700'

    - name: Fetch Frontend .env from 1Password
      ansible.builtin.command:
        cmd: "op read 'op://LifeHub/EnvProdWeb/.env' --out-file {{ deploy_local_base }}/web/.env"
      changed_when: true
      no_log: true

# ---------------------------------------------------------------------------
# Play 2 – runs on horizon.lan: verify tooling, upload, build, restart worker
# ---------------------------------------------------------------------------
- name: Deploy Frontend Worker to horizon.lan
  hosts: front_worker
  gather_facts: true
  become: false

  vars:
    deploy_path: /opt/data1/lifehub/front/worker
    env_local_path: "{{ deploy_local_base }}/web/.env"
    rsync_excludes:
      - "--exclude=.agents"
      - "--exclude=.claude"
      - "--exclude=.bruno"
      - "--exclude=.codex"
      - "--exclude=bootstrap/cache"
      - "--exclude=deployer"
      - "--exclude=docker"
      - "--exclude=storage"
      - "--exclude=stubs"
      - "--exclude=tests"
      - "--exclude=vendor"
      - "--exclude=.*"
      - "--exclude=AGENTS.md"
      - "--exclude=CLAUDE.md"
      - "--exclude=README.md"
      - "--exclude=LICENSE"
      - "--exclude=boost.json"
      - "--exclude=deploy.php"
      - "--exclude=docker-compose*"
      - "--exclude=phpstan*"
      - "--exclude=phpunit.xml"
      - "--exclude=pint.json"
      - "--exclude=rector.php"
      - "--exclude=node_modules"
      - "--exclude=skills-lock.json"

  roles:
    - php_verify
    - composer_verify
    - supervisor_verify
    - bun_verify
    - release_setup

  tasks:
    - name: Upload .env to shared directory
      ansible.builtin.copy:
        src: "{{ env_local_path }}"
        dest: "{{ deploy_path }}/shared/.env"
        mode: '0600'
      no_log: true

    - name: Sync web application files to worker release directory
      ansible.posix.synchronize:
        src: "{{ deploy_repo_path }}/apps/web/"
        dest: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web/"
        rsync_opts: "{{ rsync_excludes }}"
        recursive: true
        delete: false
      become: false

    - name: Sync sdk-web package to release directory
      ansible.posix.synchronize:
        src: "{{ deploy_repo_path }}/packages/sdk-web/"
        dest: "{{ deploy_path }}/releases/{{ new_release_num }}/packages/sdk-web/"
        recursive: true
        delete: false
      become: false

    - name: Create .env symlink inside web worker release
      ansible.builtin.file:
        src: "{{ deploy_path }}/shared/.env"
        dest: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web/.env"
        state: link
        force: true

    - name: Create persistent storage directories in shared (survives across releases)
      ansible.builtin.file:
        path: "{{ deploy_path }}/shared/storage/{{ item }}"
        state: directory
        mode: '0777'
      become: true
      loop:
        - app/private
        - app/public
        - framework/cache/data
        - framework/sessions
        - framework/testing
        - framework/views
        - logs

    - name: Create bootstrap/cache directory in release
      ansible.builtin.file:
        path: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web/bootstrap/cache"
        state: directory
        mode: '0777'

    - name: Link release storage to shared storage
      ansible.builtin.file:
        src: "{{ deploy_path }}/shared/storage"
        dest: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web/storage"
        state: link
        force: true

    - name: Run composer install
      ansible.builtin.command:
        cmd: "composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader"
        chdir: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web"
      changed_when: true

    - name: Run artisan optimize
      ansible.builtin.command:
        cmd: "{{ php_bin }} artisan optimize"
        chdir: "{{ deploy_path }}/releases/{{ new_release_num }}/apps/web"
      changed_when: true

    - name: Find the lifehub-web supervisor process name
      ansible.builtin.shell:
        cmd: "supervisorctl status | grep '^lifehub-web' | awk '{print $1}' | head -1"
        executable: /bin/bash
      register: supervisor_process_result
      changed_when: false
      become: true

    - name: Abort if no lifehub-web process was found in supervisord
      ansible.builtin.fail:
        msg: >
          No process matching 'lifehub-web' was found in supervisord status.
          Ensure the supervisor program is configured before running this playbook.
      when: supervisor_process_result.stdout | trim | length == 0

    - name: Restart lifehub-web supervisor process
      ansible.builtin.command:
        cmd: "supervisorctl restart {{ supervisor_process_result.stdout | trim }}"
      become: true
      changed_when: true

  post_tasks:
    - name: Finalize release – switch symlink and update counter
      ansible.builtin.include_role:
        name: release_finalize

    - name: Remove oldest releases beyond the configured limit
      ansible.builtin.include_role:
        name: release_cleanup
